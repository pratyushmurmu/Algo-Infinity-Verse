<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Metric Sync Dashboard</title>
    <link rel="stylesheet" href="leetcode.css">
</head>
<body>

    <main class="leetcode-dashboard-wrapper">
        
        <header class="dashboard-header">
            <h2>LeetCode Profile Engine</h2>
            <p>Sync and visualize real-time algorithmic solving metrics.</p>
        </header>

        <section class="control-panel-card">
            <div class="input-group">
                <label for="leetcode-username">LeetCode Username</label>
                <div class="search-action-row">
                    <input 
                        type="text" 
                        id="leetcode-username" 
                        placeholder="e.g., j_hanumanthu" 
                        spellcheck="false"
                        autocomplete="off"
                    >
                    <button id="sync-engine-btn" type="button">
                        <span class="btn-text">Sync Profile</span>
                        <span class="spinner hidden"></span>
                    </button>
                </div>
            </div>
        </section>

        <section class="metrics-display-grid">
            
            <div class="metric-card card-total">
                <div class="card-meta">
                    <span class="card-label">Overall Progress</span>
                </div>
                <div class="metric-value-row">
                    <h3 id="stat-total-solved">0</h3>
                </div>
                <small class="card-subtext">Total Problems Solved</small>
            </div>

            <div class="metric-card card-easy">
                <div class="card-meta">
                    <span class="card-label">Easy</span>
                </div>
                <div class="metric-value-row">
                    <h3 id="stat-easy-solved">0</h3>
                </div>
                <small class="card-subtext">Foundational Concepts</small>
            </div>

            <div class="metric-card card-medium">
                <div class="card-meta">
                    <span class="card-label">Medium</span>
                </div>
                <div class="metric-value-row">
                    <h3 id="stat-medium-solved">0</h3>
                </div>
                <small class="card-subtext">Algorithmic Core</small>
            </div>

            <div class="metric-card card-hard">
                <div class="card-meta">
                    <span class="card-label">Hard</span>
                </div>
                <div class="metric-value-row">
                    <h3 id="stat-hard-solved">0</h3>
                </div>
                <small class="card-subtext">Advanced Optimizations</small>
            </div>

        </section>

    </main>

    <script src="leetcode.js"></script>
</body>
</html>
